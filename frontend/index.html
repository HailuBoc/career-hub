<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>CareerHub — Find Your Dream Career</title>
    <meta name="description" content="CareerHub connects talented professionals with world-class companies. Browse 10,000+ jobs, apply in seconds, and track your applications — all in one place." />

    <meta name="author" content="CareerHub" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:title" content="CareerHub — Find Your Dream Career" />

    <meta property="twitter:description" content="Connect with world-class companies and discover opportunities that match your skills." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
      body { font-family: 'Inter', sans-serif; }
      #root { min-height: 100vh; }
